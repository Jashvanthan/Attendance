# Render YAML configuration for AttendAI
services:
  - type: web
    name: attend-ai-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python -m spacy download en_core_web_sm"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
    # Enable a persistent disk so your SQLite database and known_faces don't get erased on every deploy
    disk:
      name: attendai-storage
      mountPath: /opt/render/project/src/backend/known_faces
      sizeGB: 1
